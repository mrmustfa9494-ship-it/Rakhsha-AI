name: Build APK

on:
  workflow_dispatch:   # manually trigger from the Actions tab
  push:
    branches: [ main ]

jobs:
  build:
    name: Build :ide-android debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK + CMake (for the ai-assistant-impl native/llama.cpp build)
        run: |
          sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Init git submodules (llama.cpp)
        run: git submodule update --init --recursive

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :ide-android:assembleDebug --console=plain --stacktrace

      - name: Locate APK
        run: find . -name "*.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeassist-debug-apk
          path: ide-android/build/outputs/apk/debug/*.apk
          if-no-files-found: error
