name: Build Release APK

on:
  workflow_dispatch: # manually trigger from Actions tab

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK + CMake
        run: sdkmanager --install "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # Generate a new keystore if one doesn't exist in secrets yet.
      # After first run: download the keystore artifact, save it safely,
      # and add KEYSTORE_BASE64 to GitHub Secrets for future signed builds.
      - name: Generate keystore (first time only)
        id: gen_keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "No keystore in secrets — generating a new one..."
            keytool -genkey -v \
              -keystore rakshaai-release.keystore \
              -alias rakshaai \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass rakshaai123 -keypass rakshaai123 \
              -dname "CN=Rakhsha AI, OU=RakshaAI, O=RakshaAI, L=India, S=India, C=IN"
            echo "KEYSTORE_GENERATED=true" >> $GITHUB_OUTPUT
          else
            echo "Using existing keystore from secrets..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > rakshaai-release.keystore
            echo "KEYSTORE_GENERATED=false" >> $GITHUB_OUTPUT
          fi

      - name: Build release APK
        run: |
          ./gradlew :ide-android:assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/rakshaai-release.keystore \
            -Pandroid.injected.signing.store.password=rakshaai123 \
            -Pandroid.injected.signing.key.alias=rakshaai \
            -Pandroid.injected.signing.key.password=rakshaai123 \
            --console=plain --stacktrace

      - name: Locate APK
        run: find . -name "*.apk"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: rakshaai-release-apk
          path: ide-android/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # Upload the keystore so you can save it as a GitHub Secret for future builds
      - name: Upload keystore (save this as KEYSTORE_BASE64 secret!)
        if: steps.gen_keystore.outputs.KEYSTORE_GENERATED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: SAVE-THIS-rakshaai-keystore
          path: rakshaai-release.keystore
